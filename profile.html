<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CraftUA — Профіль</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="https://craftua.free.nf/style.css?v=3.0.0">
</head>

<body>

<header class="header">
    <a href="index.html" class="logo">CraftUA</a>

    <div class="header-right">
        <a href="https://github.com/MrOrum/CraftUA-Launcher/releases/download/1.0.3/CraftUA-Installer.exe" class="header-launcher">
            Лаунчер
        </a>

        <div class="login-panel" id="login-panel">
            <!-- JS підставить дані після перевірки токена -->
        </div>
    </div>
</header>

<main>
    <div class="profile-container" id="profile-box">

        <img src="https://minotar.net/avatar/Steve/110" class="profile-avatar" id="profile-avatar">

        <div class="profile-username" id="profile-username">Завантаження...</div>
        <div class="profile-status">Акаунт авторизований</div>

        <a href="https://github.com/MrOrum/CraftUA-Launcher/releases/download/1.0.3/CraftUA-Installer.exe" class="profile-btn">
            Завантажити лаунчер
        </a>

        <a href="#" class="profile-btn logout-red" onclick="logout()">
            Вийти
        </a>

    </div>
</main>

<script>
/* ---------------- API ---------------- */
const API = "https://craftua-auth-api.onrender.com/auth";

/* ---------------- Універсальний fetch з авто-очікуванням Render ---------------- */
async function apiRequest(url, options = {}, retries = 3) {
    try {
        const res = await fetch(url, options);

        const text = await res.text();
        let data;

        try {
            data = JSON.parse(text);
        } catch {
            throw new Error("NOT_JSON");
        }

        return { ok: res.ok, data };
    } catch (err) {
        if (retries > 0) {
            await new Promise(r => setTimeout(r, 1200));
            return apiRequest(url, options, retries - 1);
        }
        throw err;
    }
}

/* ---------------- Перевірка токена ---------------- */
async function verifyToken() {
    const token = localStorage.getItem("token");
    if (!token) return false;

    try {
        const { ok, data } = await apiRequest(`${API}/verify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
        });

        return ok && data.success;

    } catch {
        return false;
    }
}

/* ---------------- Завантаження профілю ---------------- */
async function loadProfile() {
    const username = localStorage.getItem("username");
    const token = localStorage.getItem("token");

    if (!username || !token) {
        window.location.href = "login.html?v=" + Date.now();
        return;
    }

    const valid = await verifyToken();
    if (!valid) {
        logout();
        return;
    }

    /* Оновлюємо header */
    const panel = document.getElementById("login-panel");
    panel.innerHTML = `
        <span class="welcome">Вітаємо, ${username}</span>
        <a href="profile.html" class="login-btn">Профіль</a>
        <button class="logout-btn" onclick="logout()">Вийти</button>
    `;

    /* Підставляємо ім’я */
    document.getElementById("profile-username").textContent = username;

    /* Аватар */
    document.getElementById("profile-avatar").src =
        \`https://minotar.net/avatar/\${username}/110\`;
}

/* ---------------- Вихід ---------------- */
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    window.location.href = "login.html?v=" + Date.now();
}

loadProfile();
</script>

</body>
</html>
